     workflows:
  ios-build-altstore:
    name: Build iOS for AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
    scripts:
      - name: Install Dependencies and Build Web
        script: |
          # Instala dependências e garante que o Capacitor esteja presente
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets
          # Gera a pasta 'dist' (Vite/Lovable)
          npm run build
      - name: Initialize Capacitor iOS
        script: |
          # Detecta a pasta de saída (Lovable usa 'dist')
          WEB_DIR="dist"
          [ ! -d "dist" ] && WEB_DIR="."
          
          # Remove lixo de tentativas anteriores e recria a pasta nativa
          rm -rf ios
          npx cap init "Salles Atelie" "com.salles.atelie" --web-dir $WEB_DIR --confirm
          npx cap add ios
          npx cap sync ios
          
          # Gera ícones e splashscreens (se houver assets/icon.png)
          npx capacitor-assets generate --ios || true
      - name: Build Unsigned IPA
        script: |
          # Entra na pasta do projeto iOS nativo
          cd ios/App
          
          # 1. Resolve dependências via Swift Package Manager (Novo padrão)
          xcodebuild -resolvePackageDependencies
          
          # 2. Build via Xcode sem assinatura (para AltStore)
          # Note que usamos .xcodeproj pois não há Pods/Workspace
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 3. Criação do arquivo .ipa fake para a AltStore
          mkdir -p Payload
          # Localiza o arquivo .app gerado
          APP_PATH=$(find ./build_output -name "App.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado pelo Xcode!"
            exit 1
          fi
          
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          # Move para a raiz para o Codemagic coletar
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
