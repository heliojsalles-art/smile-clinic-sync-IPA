      - name: Build Unsigned IPA
        script: |
          # 1. Verifica se a pasta existe
          if [ ! -d "ios/App" ]; then
            echo "ERRO: A pasta ios/App não foi encontrada!"
            exit 1
          fi

          cd ios/App
          
          # 2. Build via Xcode usando SPM (sem pod install)
          # Adicionamos -resolvePackageDependencies para baixar as bibliotecas Swift
          xcodebuild build \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            -resolvePackageDependencies \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 3. Cria o IPA para AltStore
          mkdir -p Payload
          # O caminho do .app no novo Xcode fica em Build/Products/Release-iphoneos/
          APP_PATH=$(find ./build_output -name "App.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: Arquivo .app não encontrado após o build!"
            exit 1
          fi
          
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
