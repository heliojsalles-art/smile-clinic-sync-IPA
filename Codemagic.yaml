 workflows:
  ios-build-altstore:
    name: Build iOS for AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets
          npm run build
      - name: Initialize Capacitor iOS
        script: |
          # Define a pasta web (Vite usa dist)
          WEB_DIR="dist"
          [ ! -d "dist" ] && WEB_DIR="."
          
          # Remove lixo e recria o projeto nativo
          rm -rf ios
          npx cap init "Salles Atelie" "com.salles.atelie" --web-dir $WEB_DIR --confirm
          npx cap add ios
          npx cap sync ios
      - name: Build Unsigned IPA (SPM Mode)
        script: |
          cd ios/App
          
          # 1. Baixa as dependências do Swift (Não usa mais Pods/Podfile)
          xcodebuild -resolvePackageDependencies
          
          # 2. Build usando o PROJETO (.xcodeproj) e não o WORKSPACE
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 3. Empacota o IPA para AltStore
          mkdir -p Payload
          APP_PATH=$(find ./build_output -name "App.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado!"
            exit 1
          fi
          
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
