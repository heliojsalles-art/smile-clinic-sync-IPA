workflows:
  ios-build-altstore:
    name: Build iOS for AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Full Build Process
        script: |
          # 1. Instalação limpa
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          
          # 2. Gera a pasta dist (Vite)
          npm run build
          
          # 3. Força a criação do arquivo de config se não existir
          if [ ! -f "capacitor.config.json" ]; then
            cat <<EOF > capacitor.config.json
            {
              "appId": "com.salles.atelie",
              "appName": "Salles Atelie",
              "webDir": "dist",
              "bundledWebRuntime": false
            }
          EOF
          fi

          # 4. CRIAÇÃO FORÇADA DA PASTA IOS
          # Remove se houver lixo e recria do zero absoluto
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          
          # 5. ENTRA NA PASTA E BUILDA
          cd ios/App
          pod install
          
          # Build via Xcode ignorando assinaturas
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 6. EMPACOTAMENTO
          mkdir -p Payload
          APP_PATH=$(find ./build_output -name "App.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado pelo Xcode!"
            exit 1
          fi
          
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
