workflows:
  ios-build-altstore:
    name: Build iOS for AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Full iOS Build
        script: |
          # 1. Instalar dependências e Build Web (Vite)
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build

          # 2. CRIAR CONFIGURAÇÃO MANUAL (Obrigatório para funcionar no CI)
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.salles.atelie",
            "appName": "Salles Atelie",
            "webDir": "dist"
          }
          EOF

          # 3. GERAR PASTA IOS DO ZERO
          rm -rf ios
          npx cap add ios
          npx cap sync ios

          # 4. BUILD NATIVO XCODE (Sem Assinatura)
          cd ios/App
          pod install
          
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 5. CRIAR IPA PARA ALTSTORE
          mkdir -p Payload
          APP_PATH=$(find ./build_output -name "App.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado!"
            exit 1
          fi
          
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
