workflows:
  ios-build-salles-atelie:
    name: Build Salles Atelie for AltStore
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Prepare Environment and Web Build
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets
          npm run build

      - name: Force Create iOS Project
        script: |
          WEB_DIR="dist"
          [ -d "build" ] && WEB_DIR="build"

          rm -rf ios

          npx cap init "Salles Atelie" "com.salles.atelie" --web-dir $WEB_DIR
          npx cap add ios
          npx cap sync ios

          npx capacitor-assets generate --ios || true

      - name: Confirm App Name
        script: |
          echo "Checking iOS app name..."
          cat ios/App/App/Info.plist | grep -A1 CFBundleDisplayName || true
          cat ios/App/App/Info.plist | grep -A1 CFBundleName || true

      - name: Build Unsigned IPA
        script: |
          if [ ! -d "ios/App" ]; then
            echo "ERRO: A pasta ios/App não foi criada!"
            exit 1
          fi

          cd ios/App
          pod install

          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          mkdir -p Payload
          APP_PATH=$(find ./build_output -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: Arquivo .app não encontrado!"
            exit 1
          fi

          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../

    artifacts:
      - "*.ipa"
