workflows:
  ios-build-altstore:
    name: Build iOS for AltStore
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies and build web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm install @capacitor/assets --save-dev
          npm run build
      - name: Capacitor Sync
        script: |
          [ ! -f "capacitor.config.json" ] && npx cap init "Salles Atelie" "com.salles.atelie" --web-dir dist
          npx cap add ios || true
          npx capacitor-assets generate --ios
          npx cap sync ios
      - name: Build Unsigned IPA
        script: |
          cd ios/App
          pod install
          # Build para dispositivo físico mas sem assinar (CODE_SIGNING_ALLOWED=NO)
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_ING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
          
          # Organiza os arquivos para criar um .ipa fake que a AltStore aceita
          mkdir -p payload/Payload
          cp -R build/Release-iphoneos/App.app payload/Payload/
          cd payload && zip -r ../SallesAtelie.ipa Payload
    artifacts:
      - ios/App/*.ipa
