workflows:
  build-ios-v2:
    name: Build iOS Final AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build
      - name: Capacitor Setup
        script: |
          WEB_DIR="dist"
          [ ! -d "dist" ] && WEB_DIR="."
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.salles.atelie",
            "appName": "Salles Atelie",
            "webDir": "$WEB_DIR"
          }
          EOF
          rm -rf ios
          npx cap add ios || true
      - name: Fix and Install Pods
        script: |
          cd ios/App
          # Força o alvo para iOS 15.0 para evitar incompatibilidade do Capacitor 6
          echo "platform :ios, '15.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end" > Podfile
          
          # 'pod update' força a resolução das dependências com o novo target
          pod update
      - name: Xcode Build Unsigned
        script: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # Empacota o IPA
          mkdir -p Payload
          APP_PATH=$(find ./output -name "App.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado!"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
