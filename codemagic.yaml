workflows:
  ios_unsigned_ipa:
    name: Smile Clinic Sync IPA
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Show versions
        script: |
          node -v
          npm -v
          xcodebuild -version
          pod --version

      - name: Install dependencies
        script: |
          npm install

      - name: Ensure capacitor config exists
        script: |
          rm -f capacitor.config.ts
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.heliosalles.smileclinicsync",
            "appName": "Smile Clinic Sync",
            "webDir": "dist",
            "server": {
              "iosScheme": "https"
            }
          }
          EOF

      - name: Build web app
        script: |
          npm run build

      - name: Recreate iOS platform
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build iOS app for device
        script: |
          cd ios/App
          rm -rf build
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            build

      - name: Create IPA file
        script: |
          cd ios/App

          echo "=== Procurando App.app em Release-iphoneos ==="
          find build -type d -name "*.app" || true

          APP_PATH=$(find build -type d -path "*Release-iphoneos/App.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERRO: App.app não encontrado em Release-iphoneos"
            exit 1
          fi

          echo "APP_PATH=$APP_PATH"

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/App.app

          rm -f ../../SmileClinicSync.ipa
          cd ../..
          /usr/bin/zip -r SmileClinicSync.ipa Payload

          echo "=== IPA criado ==="
          ls -lah SmileClinicSync.ipa
          unzip -l SmileClinicSync.ipa | head -40

    artifacts:
      - SmileClinicSync.ipa
      - /tmp/xcodebuild_logs/*.log
