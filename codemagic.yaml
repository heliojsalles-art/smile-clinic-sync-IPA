workflows:
  build-ios-v2:
    name: Build iOS Final AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build
      - name: Capacitor Setup (No Pods)
        script: |
          WEB_DIR="dist"
          [ ! -d "dist" ] && WEB_DIR="."
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.salles.atelie",
            "appName": "Salles Atelie",
            "webDir": "$WEB_DIR"
          }
          EOF
          rm -rf ios
          npx cap add ios || true
          npx cap copy ios
      - name: Force Podfile and Install Pods
        script: |
          cd ios/App
          # Criamos o Podfile com iOS 14.0 e um script de pós-instalação para alinhar todos os plugins
          cat <<EOF > Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
              end
            end
          end
          EOF
          
          pod install
      - name: Xcode Build Unsigned
        script: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          mkdir -p Payload
          APP_PATH=$(find ./output -name "App.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado!"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
