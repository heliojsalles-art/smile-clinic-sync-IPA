workflows:
  build-ios-v2:
    name: Build iOS Final AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build
      - name: Capacitor Manual Config and Sync
        script: |
          # 1. Define a pasta web (Vite usa dist)
          WEB_DIR="dist"
          [ ! -d "dist" ] && WEB_DIR="."
          
          # 2. Cria o arquivo de configuração manualmente (Resolve o erro de appId)
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.salles.atelie",
            "appName": "Salles Atelie",
            "webDir": "$WEB_DIR",
            "bundledWebRuntime": false
          }
          EOF

          # 3. Adiciona a plataforma iOS do zero
          rm -rf ios
          npx cap add ios
          npx cap sync ios
      - name: Xcode Build Unsigned
        script: |
          cd ios/App
          # Resolve dependências via Swift Package Manager
          xcodebuild -resolvePackageDependencies
          
          # Build usando o arquivo de projeto (.xcodeproj)
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # Criar o IPA para AltStore
          mkdir -p Payload
          APP_PATH=$(find ./output -name "App.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado!"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
