workflows:
  build-ios-v2:
    name: Build iOS Final AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build
      - name: Capacitor Setup
        script: |
          WEB_DIR="dist"
          [ ! -d "dist" ] && WEB_DIR="."
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.salles.atelie",
            "appName": "Salles Atelie",
            "webDir": "$WEB_DIR"
          }
          EOF
          rm -rf ios
          npx cap add ios || true
          npx cap sync ios || true
      - name: Build Unsigned via SPM (No CocoaPods)
        script: |
          cd ios/App
          
          # 1. Remove as fases de build do CocoaPods que travam o Xcode
          # Isso limpa o erro de "Podfile.lock" e "Check Pods Manifest"
          sed -i '' '/\[CP\]/d' App.xcodeproj/project.pbxproj
          sed -i '' '/Pods-App/d' App.xcodeproj/project.pbxproj
          
          # 2. Resolve dependências via Swift Package Manager
          xcodebuild -resolvePackageDependencies
          
          # 3. Build Unsigned para iPhone real (iOS 13+ é o padrão SPM)
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 4. Empacota o IPA
          mkdir -p Payload
          APP_PATH=$(find ./output -name "App.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado!"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
