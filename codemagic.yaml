workflows:
  ios-build-altstore:
    name: Build iOS for AltStore
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies and build web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm install @capacitor/assets --save-dev
          npm run build
      - name: Capacitor Sync
        script: |
          [ ! -f "capacitor.config.json" ] && npx cap init "Salles Atelie" "com.salles.atelie" --web-dir dist
          npx cap add ios || true
          npx capacitor-assets generate --ios
          npx cap sync ios
      - name: Build Unsigned IPA
        script: |
          cd ios/App
          pod install
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
          
          mkdir -p Payload
          find build/Build/Products/Release-iphoneos -name "App.app" -exec cp -R {} Payload/ \;
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
