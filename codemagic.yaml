workflows:
build_ios_unsigned:
name: Build iOS Unsigned IPA
instance_type: mac_mini_m2

```
environment:
  node: 20
  xcode: latest
  cocoapods: default

scripts:
  - name: Install dependencies
    script: |
      npm install

  - name: Build web app
    script: |
      npm run build

  - name: Create capacitor config
    script: |
      cat > capacitor.config.ts <<'EOF'
      import type { CapacitorConfig } from '@capacitor/cli';

      const config: CapacitorConfig = {
        appId: 'com.heliosalles.smileclinicsync',
        appName: 'Smile Clinic Sync',
        webDir: 'dist'
      };

      export default config;
      EOF

  - name: Add iOS
    script: |
      npx cap add ios

  - name: Sync
    script: |
      npx cap sync ios

  - name: Build iOS
    script: |
      cd ios/App
      xcodebuild \
      -workspace App.xcworkspace \
      -scheme App \
      -configuration Release \
      -sdk iphoneos \
      -derivedDataPath build \
      CODE_SIGNING_ALLOWED=NO \
      clean build

  - name: Package IPA
    script: |
      cd ios/App
      mkdir Payload
      cp -r build/Build/Products/Release-iphoneos/App.app Payload/
      zip -r SmileClinicSync.ipa Payload
      mv SmileClinicSync.ipa $CM_BUILD_DIR/

artifacts:
  - SmileClinicSync.ipa
```
