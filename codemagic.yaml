workflows:
  ios_unsigned_ipa_for_sideloadly:
    name: Smile Clinic Sync Unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - ~/Library/Developer/Xcode/DerivedData

    scripts:
      - name: Show versions
        script: |
          node -v
          npm -v
          xcodebuild -version
          pod --version

      - name: Install dependencies
        script: |
          npm install

      - name: Ensure capacitor config exists
        script: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            cat > capacitor.config.json <<'EOF'
            {
              "appId": "com.heliosalles.smileclinicsync",
              "appName": "Smile Clinic Sync",
              "webDir": "dist",
              "server": {
                "iosScheme": "https"
              }
            }
            EOF
          fi

      - name: Build web app
        script: |
          npm run build

      - name: Recreate iOS platform
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build for real iPhone device
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Locate built app
        script: |
          cd ios/App
          find build -type d -name "*.app" || true
          APP_PATH=$(find build -type d -path "*Release-iphoneos/*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "Nenhum .app de iphoneos foi encontrado."
            echo "Conteúdo encontrado:"
            find build -maxdepth 6 -type d | sed -n '1,200p'
            exit 1
          fi

          echo "$APP_PATH" > /tmp/app_path.txt
          echo "APP_PATH=$APP_PATH"

      - name: Create unsigned IPA
        script: |
          cd ios/App
          APP_PATH=$(cat /tmp/app_path.txt)

          rm -rf Payload SmileClinicSync.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/App.app

          /usr/bin/zip -qry SmileClinicSync.ipa Payload
          mv SmileClinicSync.ipa ../../SmileClinicSync.ipa

      - name: Verify IPA
        script: |
          cd ../..
          ls -lah SmileClinicSync.ipa
          unzip -l SmileClinicSync.ipa | sed -n '1,80p'

    artifacts:
      - SmileClinicSync.ipa
      - /tmp/xcodebuild_logs/*.log
