workflows:
  build_ios_unsigned:
    name: Build iOS Unsigned IPA
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.npm
        - ~/Library/Caches/CocoaPods
        - ios/App/Pods

    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Build web app
        script: |
          npm run build
          test -d dist || { echo "Pasta dist não foi gerada"; exit 1; }

      - name: Create capacitor config
        script: |
          cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.heliosalles.smileclinicsync',
            appName: 'Smile Clinic Sync',
            webDir: 'dist',
            bundledWebRuntime: false,
          };

          export default config;
          EOF

      - name: Add iOS platform
        script: |
          rm -rf ios
          npx cap add ios

      - name: Sync iOS project
        script: |
          npx cap sync ios

      - name: Force iOS deployment target
        script: |
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.0'/g" ios/App/Podfile || true
          cd ios/App
          pod install

      - name: Build unsigned .app
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build

      - name: Package .ipa
        script: |
          cd ios/App
          APP_PATH=$(find build -type d -name "App.app" | head -n 1)
          test -n "$APP_PATH" || { echo "App.app não encontrado"; exit 1; }

          rm -rf Payload SmileClinicSync.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/App.app
          zip -r SmileClinicSync.ipa Payload
          mv SmileClinicSync.ipa $CM_BUILD_DIR/SmileClinicSync.ipa

    artifacts:
      - SmileClinicSync.ipa
