workflows:
  build-ios-v2:
    name: Build iOS Final AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build
      - name: Capacitor Manual Config
        script: |
          WEB_DIR="dist"
          [ ! -d "dist" ] && WEB_DIR="."
          
          # Cria o config forçando o uso do iOS 13 como alvo
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.salles.atelie",
            "appName": "Salles Atelie",
            "webDir": "$WEB_DIR",
            "ios": { "path": "ios" }
          }
          EOF

          rm -rf ios
          # Adiciona a plataforma SEM rodar o pod install (que é onde dá o erro)
          npx cap add ios
          npx cap sync ios --no-pod-install || true
      - name: Xcode Build Unsigned (SPM Mode)
        script: |
          cd ios/App
          
          # 1. Resolve dependências via Swift Package Manager (ignora o erro do CocoaPods)
          xcodebuild -resolvePackageDependencies
          
          # 2. Build usando o .xcodeproj direto com alvo iOS 13+
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./output \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 3. Empacota o IPA
          mkdir -p Payload
          APP_PATH=$(find ./output -name "App.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado!"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
