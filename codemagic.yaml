workflows:
  ios-ipa:
    name: Organizza IPA
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest
      cocoapods: default

    scripts:
      - name: Show versions
        script: |
          node -v
          npm -v
          xcodebuild -version

      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Create iOS project if missing
        script: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build iOS device app
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Create IPA
        script: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*Release-iphoneos*" | head -n 1)

          echo "APP PATH:"
          echo $APP

          mkdir Payload
          cp -R "$APP" Payload/

          zip -r Organizza.ipa Payload

    artifacts:
      - Organizza.ipa
