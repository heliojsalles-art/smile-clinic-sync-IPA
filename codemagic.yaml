workflows:
  android-build:
    name: Build Web to APK
    instance_type: mac_mini_m2
    environment:
      node: latest
      java: 21
    scripts:
      - name: Install dependencies and build web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Instalar ferramentas de ícone/splash
          npm install @capacitor/assets --save-dev
          npm run build
      - name: Capacitor Sync
        script: |
          # Define o nome "Salles Atelie" e ID no init
          [ ! -f "capacitor.config.json" ] && npx cap init "Salles Atelie" "com.salles.atelie" --web-dir dist
          
          # Se o arquivo já existir, certifique-se de editar o "appName" manualmente no arquivo:
          # "appName": "Salles Atelie"

          npx cap add android || true
          
          # Gera ícones e splashscreens automaticamente (requer assets/icon.png)
          npx capacitor-assets generate --android
          
          npx cap sync android
      - name: Build APK with Gradle
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
