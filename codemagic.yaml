workflows:
build_ios_unsigned:
name: Build iOS Unsigned IPA
instance_type: mac_mini_m2

```
environment:
  node: 20
  xcode: latest
  cocoapods: default

scripts:
  - name: Install dependencies
    script: |
      npm install

  - name: Build web app
    script: |
      npm run build

  - name: Create Capacitor config
    script: |
      cat > capacitor.config.ts <<EOF
      import type { CapacitorConfig } from '@capacitor/cli';

      const config: CapacitorConfig = {
        appId: 'com.heliosalles.smileclinicsync',
        appName: 'Smile Clinic Sync',
        webDir: 'dist'
      };

      export default config;
      EOF

  - name: Add iOS platform
    script: |
      npx cap add ios

  - name: Sync iOS project
    script: |
      npx cap sync ios

  - name: Install CocoaPods
    script: |
      cd ios/App
      pod install

  - name: Build iOS app
    script: |
      cd ios/App
      xcodebuild \
        -workspace App.xcworkspace \
        -scheme App \
        -configuration Release \
        -sdk iphoneos \
        -derivedDataPath build \
        CODE_S_
```
