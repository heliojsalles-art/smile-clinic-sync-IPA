workflows:
  ios_unsigned_ipa:
    name: Smile Clinic Sync IPA
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - ~/Library/Developer/Xcode/DerivedData

    scripts:
      - name: Show versions
        script: |
          node -v
          npm -v
          xcodebuild -version
          pod --version

      - name: Install web dependencies
        script: |
          npm install

      - name: Install Capacitor packages
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Build web app
        script: |
          npm run build

      - name: Create capacitor config
        script: |
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.heliosalles.smileclinicsync",
            "appName": "Smile Clinic Sync",
            "webDir": "dist",
            "server": {
              "iosScheme": "https"
            }
          }
          EOF

      - name: Recreate iOS platform
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build unsigned iPhone app
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            build

      - name: Package IPA
        script: |
          cd ios/App

          APP_PATH=$(find build -type d -path "*Release-iphoneos/App.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "App.app não encontrado"
            find build -type d -name "*.app"
            exit 1
          fi

          rm -rf Payload SmileClinicSync.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/App.app

          /usr/bin/zip -r SmileClinicSync.ipa Payload

          mv SmileClinicSync.ipa ../../SmileClinicSync.ipa

      - name: Verify artifact
        script: |
          ls -lah
          unzip -l SmileClinicSync.ipa | head -50

    artifacts:
      - SmileClinicSync.ipa
      - ios/App/build/**/Build/**/*.app
      - /tmp/xcodebuild_logs/*.log
