workflows:
  build-ios-v2:
    name: Build iOS Final AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build
      - name: Capacitor Manual Config
        script: |
          WEB_DIR="dist"
          [ ! -d "dist" ] && WEB_DIR="."
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.salles.atelie",
            "appName": "Salles Atelie",
            "webDir": "$WEB_DIR",
            "ios": { "path": "ios" }
          }
          EOF
          rm -rf ios
          npx cap add ios
          # O sync vai falhar nos pods, mas continuamos para o SPM
          npx cap sync ios || true
      - name: Clean Pods Scripts and Build
        script: |
          cd ios/App
          
          # 1. Remove as fases de script do CocoaPods do projeto Xcode
          # Isso deleta os scripts [CP] que estão travando seu build
          sed -i '' '/\[CP\]/d' App.xcodeproj/project.pbxproj
          sed -i '' '/Pods-App/d' App.xcodeproj/project.pbxproj
          
          # 2. Resolve via Swift Package Manager
          xcodebuild -resolvePackageDependencies
          
          # 3. Build Unsigned com alvo iOS 13+
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./output \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 4. Empacota o IPA para AltStore
          mkdir -p Payload
          APP_PATH=$(find ./output -name "App.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado!"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
