workflows:
  build-ios-v2:
    name: Build iOS Final AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build
      - name: Capacitor Sync
        script: |
          WEB_DIR="dist"
          [ ! -d "dist" ] && WEB_DIR="."
          rm -rf ios
          npx cap init "Salles Atelie" "com.salles.atelie" --web-dir $WEB_DIR --confirm
          npx cap add ios
          npx cap sync ios
      - name: Xcode Build Unsigned
        script: |
          cd ios/App
          # Resolve dependências via Swift Package Manager (sem CocoaPods)
          xcodebuild -resolvePackageDependencies
          
          # Build usando o .xcodeproj (não xcworkspace)
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # Criar IPA
          mkdir -p Payload
          APP_PATH=$(find ./output -name "App.app" | head -n 1)
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
