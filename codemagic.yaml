workflows:
  organiza_android_debug:
    name: Organiza Android Debug
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    scripts:
      - npm install
      - npm run build
      - npx cap sync android
      - |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
