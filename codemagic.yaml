workflows:
  build-ios-v2:
    name: Build iOS Final AltStore
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build
      - name: Capacitor Setup (No Pods)
        script: |
          WEB_DIR="dist"
          [ ! -d "dist" ] && WEB_DIR="."
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.salles.atelie",
            "appName": "Salles Atelie",
            "webDir": "$WEB_DIR"
          }
          EOF
          rm -rf ios
          # Força a criação da pasta ignorando o erro de Pods
          npx cap add ios || true
          npx cap copy ios
      - name: Fix Podfile and Install Pods
        script: |
          cd ios/App
          # Se o Podfile não existir por erro do add ios, nós criamos um padrão para o Cap 6
          if [ ! -f "Podfile" ]; then
            npx cap ios update
          fi
          # Troca o target de 11.0 para 13.0 (requisito do Capacitor 6)
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '13.0'/g" Podfile
          pod install
      - name: Xcode Build Unsigned
        script: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          mkdir -p Payload
          APP_PATH=$(find ./output -name "App.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não foi gerado!"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          zip -r SallesAtelie.ipa Payload
          mv SallesAtelie.ipa ../../
    artifacts:
      - "*.ipa"
